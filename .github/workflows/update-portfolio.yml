name: Update Portfolio Prices

on:
  schedule:
    # Runs at 4:30pm ET (21:30 UTC) Monday-Friday
    - cron: '30 21 * * 1-5'
  workflow_dispatch: # Allow manual trigger

jobs:
  update-prices:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Fetch prices and update portfolio
        env:
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
        run: |
          python3 << 'PYEOF'
          import urllib.request
          import json
          import re
          import os
          from datetime import datetime

          api_key = os.environ['FINNHUB_API_KEY']
          tickers = ['VT', 'VOO', 'VB', 'VXUS', 'IAU', 'IBIT', 'MP']

          # Cost basis (combined accounts, fixed)
          cost_basis = {
            'VT':   9233.80,
            'VOO':  6633.13,
            'VB':   1701.70,
            'VXUS': 1118.28,
            'IAU':   615.48,
            'IBIT':  199.14,
            'MP':     49.81,
          }

          # Shares held
          shares = {
            'VT':   65.5394,
            'VOO':  11.0802,
            'VB':    7.0667,
            'VXUS': 15.3272,
            'IAU':   8.0,
            'IBIT':  3.0,
            'MP':    1.0,
          }

          prices = {}
          for ticker in tickers:
            try:
              url = f'https://finnhub.io/api/v1/quote?symbol={ticker}&token={api_key}'
              with urllib.request.urlopen(url, timeout=10) as resp:
                data = json.loads(resp.read())
                prices[ticker] = round(data['c'], 2)  # current price
                print(f'{ticker}: ${prices[ticker]}')
            except Exception as e:
              print(f'Error fetching {ticker}: {e}')
              prices[ticker] = None

          # Calculate market values and gains
          holdings_js = []
          total_mkt = 0
          total_cost = sum(cost_basis.values())

          name_map = {
            'VT':   'Vanguard Total World Stock ETF',
            'VOO':  'Vanguard S&P 500 ETF',
            'VB':   'Vanguard Small-Cap ETF',
            'VXUS': 'Vanguard Total International Stock',
            'IAU':  'iShares Gold Trust',
            'IBIT': 'iShares Bitcoin Trust ETF',
            'MP':   'MP Materials Corp.',
          }
          color_map = {
            'VT':   '#2c2416',
            'VOO':  '#b8972a',
            'VB':   '#6b5c3e',
            'VXUS': '#a0917a',
            'IAU':  '#c0aa88',
            'IBIT': '#5a5048',
            'MP':   '#3a6b4a',
          }
          dom_map  = {'VT':0.58,'VOO':1.00,'VB':1.00,'VXUS':0.00,'IAU':0.00,'IBIT':0.00,'MP':1.00}
          intl_map = {'VT':0.42,'VOO':0.00,'VB':0.00,'VXUS':1.00,'IAU':0.00,'IBIT':0.00,'MP':0.00}

          for ticker in tickers:
            price = prices.get(ticker)
            if price:
              mkt_val = round(shares[ticker] * price, 2)
            else:
              # Fallback to last known value
              mkt_val = {'VT':10368.99,'VOO':7701.52,'VB':2083.40,'VXUS':1324.55,'IAU':683.68,'IBIT':124.91,'MP':52.31}[ticker]
            
            total_mkt += mkt_val
            since_pct = round((mkt_val - cost_basis[ticker]) / cost_basis[ticker] * 100, 1)
            
            holdings_js.append(
              f"  {{ ticker: '{ticker}', name: '{name_map[ticker]}', mktVal: {mkt_val}, sincePct: {since_pct}, "
              f"color: '{color_map[ticker]}', domPct: {dom_map[ticker]}, intlPct: {intl_map[ticker]} }}"
            )

          total_gain_pct = round((total_mkt - total_cost) / total_cost * 100, 1)
          total_gain_str = f'+{total_gain_pct}%' if total_gain_pct >= 0 else f'{total_gain_pct}%'
          updated = datetime.now().strftime('%B %d, %Y')

          holdings_block = 'var holdings = [\n' + ',\n'.join(holdings_js) + '\n];'

          # Read portfolio.html
          with open('portfolio.html', 'r') as f:
            content = f.read()

          # Replace holdings array
          content = re.sub(
            r'var holdings = \[.*?\];',
            holdings_block,
            content,
            flags=re.DOTALL
          )

          # Replace total gain percentage
          content = re.sub(
            r'font-size:42px[^>]+>[+\-][\d.]+%<',
            f'font-size:42px;font-weight:600;color:#3a6b4a;line-height:1;">{total_gain_str}<',
            content
          )

          # Replace "As of" date
          content = re.sub(
            r'As of [A-Za-z]+ \d+, \d{4}',
            f'As of {updated}',
            content
          )

          with open('portfolio.html', 'w') as f:
            f.write(content)

          print(f'Portfolio updated. Total value: ${total_mkt:,.2f} ({total_gain_str} since inception)')
          PYEOF

      - name: Commit updated portfolio
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add portfolio.html
          git diff --staged --quiet || git commit -m "Auto-update portfolio prices $(date +'%Y-%m-%d')"
          git push
