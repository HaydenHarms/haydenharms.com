<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1B3A6B" stroke-width="0.5" opacity="0.4"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#0D1B2A"/>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Gold top/bottom borders -->
  <rect x="0" y="0" width="1200" height="5" fill="#B8972A"/>
  <rect x="0" y="625" width="1200" height="5" fill="#B8972A"/>

  <!-- Subtle side accent bars -->
  <rect x="80" y="0" width="2" height="630" fill="#B8972A" opacity="0.25"/>
  <rect x="1118" y="0" width="2" height="630" fill="#B8972A" opacity="0.25"/>

  <!-- Name -->
  <text x="600" y="248" font-family="Georgia, serif" font-size="88" font-weight="900" fill="#F0F4FA" text-anchor="middle" letter-spacing="-2">Hayden Harms</text>

  <!-- Gold rule -->
  <rect x="540" y="272" width="120" height="3" fill="#B8972A"/>

  <!-- Subtitle -->
  <text x="600" y="332" font-family="Courier New, monospace" font-size="17" fill="#B8972A" text-anchor="middle" letter-spacing="6">ACCOUNTING STUDENT · ASPIRING CPA</text>

  <!-- Thin divider -->
  <line x1="200" y1="378" x2="1000" y2="378" stroke="#1B3A6B" stroke-width="1.5"/>

  <!-- Detail line -->
  <text x="600" y="422" font-family="Courier New, monospace" font-size="13" fill="#5A6A7E" text-anchor="middle" letter-spacing="4">DALLAS BAPTIST UNIVERSITY · AIRBUS HELICOPTERS</text>

  <!-- URL -->
  <text x="600" y="532" font-family="Courier New, monospace" font-size="15" fill="#5A6A7E" text-anchor="middle" letter-spacing="3">haydenharms.github.io</text>

  <!-- Corner marks -->
  <path d="M 100 100 L 100 130 M 100 100 L 130 100" stroke="#B8972A" stroke-width="1.5" fill="none" opacity="0.5"/>
  <path d="M 1100 100 L 1100 130 M 1100 100 L 1070 100" stroke="#B8972A" stroke-width="1.5" fill="none" opacity="0.5"/>
  <path d="M 100 530 L 100 500 M 100 530 L 130 530" stroke="#B8972A" stroke-width="1.5" fill="none" opacity="0.5"/>
  <path d="M 1100 530 L 1100 500 M 1100 530 L 1070 530" stroke="#B8972A" stroke-width="1.5" fill="none" opacity="0.5"/>
</svg>
